server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: qualquer rota desconhecida cai no index.html
    # (o roteamento é feito no client pelo wouter).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # cache longo para assets versionados (hash no nome)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
